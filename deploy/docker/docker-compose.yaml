name: distr

services:
  postgres:
    image: 'postgres:18.3-alpine3.23'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - 'postgres:/var/lib/postgresql/'
    restart: always
    healthcheck:
      test: pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      start_interval: 1s
      interval: 5s
      retries: 6
      start_period: 30s
  hub:
    image: ghcr.io/distr-sh/distr-ce:2.20.0 # x-release-please-version
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - '8080:8080'
      - '8585:8585'
    restart: always

  # The OCI registry of distr can use any S3 compatible storage to store OCI images.
  # If you don't want to use the OCI registry (REGISTRY_ENABLED=false) or want to use an external S3 provider,
  # you don't need to run the storage service.
  storage:
    image: 'rustfs/rustfs:1.0.0-alpha.83'
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - 'rustfs:/data/'
    environment:
      RUSTFS_ACCESS_KEY: local
      RUSTFS_SECRET_KEY: local

  artifact-blob-cleanup:
    image: ghcr.io/distr-sh/distr-ce:2.20.0 # x-release-please-version
    command: [cleanup, ArtifactBlob, --timeout, 10m]
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_started
    env_file:
      - .env
    restart: 'no'
    profiles:
      - cleanup

volumes:
  postgres:
  rustfs:
