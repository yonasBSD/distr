# note: the compose project name will be overridden by the distr agent, to create a unique name
name: hello-distr

# note: only share non-sensitive data to avoid accidental exposure of sensitive values (like passwords) to other containers
x-shared-env: &shared-env
  HELLO_DISTR_HOST: ${HELLO_DISTR_HOST:?error}
  HELLO_DISTR_PROTOCOL: ${HELLO_DISTR_PROTOCOL:-http}
  HELLO_DISTR_DB_NAME: ${HELLO_DISTR_DB_NAME:?error}

services:
  postgres:
    image: 'postgres:18.3-alpine3.23'
    environment:
      <<: *shared-env
      POSTGRES_USER: ${HELLO_DISTR_DB_USER:?error}
      POSTGRES_PASSWORD: ${HELLO_DISTR_DB_PASSWORD:?error}
      POSTGRES_DB: ${HELLO_DISTR_DB_NAME:?error}
    healthcheck:
      test: pg_isready -h localhost -U ${HELLO_DISTR_DB_USER:?error} -d ${HELLO_DISTR_DB_NAME:?error}
      interval: 5s
    volumes:
      - 'postgres:/var/lib/postgresql/'
    networks:
      - app_network

  backend:
    image: ghcr.io/distr-sh/hello-distr/backend:0.4.4 # x-release-please-version
    environment:
      <<: *shared-env
      DB_URL: postgresql://${HELLO_DISTR_DB_USER:?error}:${HELLO_DISTR_DB_PASSWORD:?error}@postgres/${HELLO_DISTR_DB_NAME:?error}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=1)",
        ]
      interval: 5s
    networks:
      - app_network

  frontend:
    image: ghcr.io/distr-sh/hello-distr/frontend:0.4.4 # x-release-please-version
    environment:
      <<: *shared-env
      NEXT_PUBLIC_API_URL: '${HELLO_DISTR_PROTOCOL:-http}://${HELLO_DISTR_HOST:?error}/api'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:3000']
      interval: 5s
    extra_hosts:
      - '${HELLO_DISTR_HOST:?error}=host-gateway'
    networks:
      - app_network

  proxy:
    image: ghcr.io/distr-sh/hello-distr/proxy:0.4.4 # x-release-please-version
    environment:
      <<: *shared-env
      HOST: ${HELLO_DISTR_HOST:?error}
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-check-certificate', '-qO-', 'http://127.0.0.1']
      interval: 5s
    networks:
      - app_network

  jobs:
    image: ghcr.io/distr-sh/hello-distr/jobs:0.4.4 # x-release-please-version
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'pgrep', 'busybox']
      interval: 5s
    networks:
      - app_network

volumes:
  postgres:

networks:
  app_network:
    driver: bridge
