# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build Hub

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'
    paths-ignore:
      - 'website/**'
      - 'docker-autoheal/**'
      - 'sdk/**'
      - 'deploy/charts/**'
  pull_request:
    paths-ignore:
      - 'website/**'
      - 'docker-autoheal/**'
      - 'sdk/**'
      - 'deploy/charts/**'

jobs:
  validate-migrations:
    name: Validate migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: hack/validate-migrations.sh

  lint-and-test-go:
    name: Lint and test (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache-dependency-path: |
            go.sum
      - name: Run go tests
        run: go test ./...
      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: 'v2.11.4' # renovate: datasource=github-releases depName=golangci/golangci-lint

  lint-and-test-node:
    name: Lint and test (Node)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Install frontend dependencies with pnpm
        run: pnpm install --frozen-lockfile
      - name: Lint with prettier
        run: pnpm run lint
      - name: Run tests
        run: pnpm run test

  build:
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: test-user
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: distr
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    name: Build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      matrix:
        edition:
          - name: community
            suffix: '-ce'
            images: |
              ghcr.io/distr-sh/distr-ce
          - name: enterprise
            suffix: -ee
            images: |
              ghcr.io/distr-sh/distr-ee
              registry.distr.sh/enterprise/distr-ee
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache-dependency-path: |
            go.sum

      - name: Install pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Generate commit hash
        id: hash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies with pnpm
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: pnpm run build:${{ matrix.edition.name }} --source-map=true

      - name: Build frontend and upload source maps (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          pnpm run build:${{ matrix.edition.name }} --source-map=true || exit 1
          pnpm run sentry-upload || exit 1
          rm internal/frontend/dist/ui/browser/*.map || exit 1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VERSION: ${{ github.ref_name }}
          SENTRY_VERSION: ${{ github.ref_name }}${{ matrix.edition.suffix }}

      - name: Write license public key (tag only)
        if: ${{ matrix.edition.name == 'enterprise' && startsWith(github.ref, 'refs/tags/') }}
        run: echo "${{ secrets.LICENSE_PUBLIC_KEY }}" > internal/license/embedded/pubkey.pem

      - name: Generate ephemeral license key (non-tag)
        id: ephemeral-key
        if: ${{ matrix.edition.name == 'enterprise' && !startsWith(github.ref, 'refs/tags/') }}
        run: |
          openssl genpkey -algorithm ed25519 -out /tmp/ephemeral_private.pem
          openssl pkey -in /tmp/ephemeral_private.pem -pubout -out internal/license/embedded/pubkey.pem
          {
            echo "private-key<<EOF"
            cat /tmp/ephemeral_private.pem
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build application (amd64)
        run: go build -ldflags="$LDFLAGS" -o dist/distr-amd64 ./cmd/hub/
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
          LDFLAGS: >-
            -X github.com/distr-sh/distr/internal/buildconfig.version=${{ github.ref_name }}
            -X github.com/distr-sh/distr/internal/buildconfig.commit=${{ steps.hash.outputs.sha_short }}
            -X github.com/distr-sh/distr/internal/buildconfig.edition=${{ matrix.edition.name }}

      - name: Build application (arm64)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: go build -ldflags="$LDFLAGS" -o dist/distr-arm64 ./cmd/hub/
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
          LDFLAGS: >-
            -X github.com/distr-sh/distr/internal/buildconfig.version=${{ github.ref_name }}
            -X github.com/distr-sh/distr/internal/buildconfig.commit=${{ steps.hash.outputs.sha_short }}
            -X github.com/distr-sh/distr/internal/buildconfig.edition=${{ matrix.edition.name }}

      - name: Generate ephemeral license JWT (non-tag enterprise only)
        id: ephemeral-license
        if: ${{ matrix.edition.name == 'enterprise' && !startsWith(github.ref, 'refs/tags/') }}
        run: echo "license-key=$(dist/distr-amd64 license-key generate --no-save --payload='{"ld":{}}')" >> $GITHUB_OUTPUT
        env:
          LICENSE_KEY_PRIVATE_KEY: ${{ steps.ephemeral-key.outputs.private-key }}
          DATABASE_URL: postgres://placeholder
          JWT_SECRET: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          DISTR_HOST: http://placeholder

      - name: Start Hub and verify migrations and docs
        shell: bash
        run: |
          dist/distr-amd64 serve &
          curl --retry 10 --retry-delay 1 --retry-connrefused -sf "$DISTR_HOST/ready" || { echo "Hub did not become ready in time"; exit 1; }
          curl $DISTR_HOST/docs/openapi.yaml -sf -o /dev/null || { echo "OpenAPI spec is not valid or not reachable at $DISTR_HOST/docs/openapi.yaml"; exit 1; }
          psql $DATABASE_URL -c "select version > 0, dirty from schema_migrations" --csv -t | grep "t,f"
          pkill -SIGTERM distr-amd64
          dist/distr-amd64 migrate --down
        env:
          DATABASE_URL: postgres://test-user:test-password@localhost:5432/distr
          JWT_SECRET: H4V7z6mEpe8/k5H/KyogT/iATJhNpEIUMd5cHF6mqF8=
          DISTR_HOST: http://localhost:8080
          LICENSE_KEY: ${{ matrix.edition.name == 'enterprise' && (startsWith(github.ref, 'refs/tags/') && secrets.LICENSE_KEY || steps.ephemeral-license.outputs.license-key) || '' }}

      - name: Generate SBOM for frontend project
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: pnpm-lock.yaml
          output-file: dist/frontend.spdx.json
          artifact-name: frontend${{ matrix.edition.suffix }}.spdx.json
          format: spdx-json
          upload-release-assets: false

      - name: Login to GitHub Container Registry (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Distr Registry (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: registry.distr.sh
          username: ${{ github.actor }}
          password: ${{ secrets.DISTR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Generate Docker Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ matrix.edition.images }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.description=Distr Hub
            org.opencontainers.image.vendor=Glasskube

      - name: Docker build (push on tag only)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build-push
        with:
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          context: .
          file: Dockerfile.hub
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          sbom: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        if: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Sign the images with GitHub OIDC Token
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
