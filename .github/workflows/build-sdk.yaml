name: Build SDK

on:
  push:
    branches:
      - 'main'
    paths:
      - 'sdk/**'
      - 'tsconfig.json'
      - '.github/workflows/build-sdk.yaml'
    tags:
      - '*'
  pull_request:
    paths:
      - sdk/**
      - 'tsconfig.json'
      - .github/workflows/build-sdk.yaml

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk/js
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            sdk
            tsconfig.json
          sparse-checkout-cone-mode: false
      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          package_json_file: sdk/js/package.json

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: sdk/js/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build application
        run: pnpm run build
      - name: Build docs
        run: pnpm run docs
      - name: Check if repository is clean
        run: |
          STATUS="$(git status --porcelain)"
          if [ -z "$STATUS" ]; then
            echo Repository is clean.
          else
            echo "Repository is not clean:"
            git diff
            echo "You might want to run 'pnpm i && pnpm run docs' in sdk/js and try again"
            exit 1
          fi
      - name: Publish to npmjs
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: pnpm publish --access public --no-git-checks
