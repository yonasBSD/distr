# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'hack/agent-changelog.mjs'
      - 'CHANGELOG.md'
      - '.github/workflows/website.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 'website/**'
      - 'hack/agent-changelog.mjs'
      - 'CHANGELOG.md'
      - '.github/workflows/website.yaml'

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: |
            website
            hack/agent-changelog.mjs
            CHANGELOG.md
          sparse-checkout-cone-mode: false
          lfs: true
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          package_json_file: website/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('website/pnpm-lock.yaml') }}
      - name: Install dependencies
        run: pnpm i
      - name: Lint with prettier
        run: pnpm run lint
      - name: Install playwright browser
        run: pnpm exec playwright install --only-shell
      - name: Build website
        run: pnpm run build
      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        if: github.ref == 'refs/heads/main'
        with:
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::639130800065:role/github-actions-distr.sh
      - name: Deploy hashed assets
        if: github.ref == 'refs/heads/main'
        run: >-
          aws s3 sync dist/_astro s3://distr.sh/_astro/
          --cache-control "max-age=31536000, public, immutable"
          --acl=public-read
      - name: Deploy dynamic content
        if: github.ref == 'refs/heads/main'
        run: >-
          aws s3 sync dist s3://distr.sh/
          --cache-control "max-age=60, public, must-revalidate"
          --acl=public-read
      - name: Invalidate cache
        if: github.ref == 'refs/heads/main'
        run: >-
          aws cloudfront create-invalidation
          --distribution-id E1PG5UM7ZE1H97
          --invalidation-batch "Paths={Quantity='1' ,Items=['/*']},CallerReference=WEBSITE_$GITHUB_RUN_ID"
